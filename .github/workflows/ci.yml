name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: task_manager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          cp .env.example .env
          echo "DB_PASSWORD=root" >> .env
          echo "DB_DATABASE=task_manager_test" >> .env

      - name: Run migrations
        run: npx sequelize-cli db:migrate
        env:
          DB_USER: root
          DB_PASSWORD: root
          DB_DATABASE: task_manager_test
          DB_HOST: localhost
          DB_DIALECT: mysql
          JWT_SECRET: test-secret

      - name: Run tests
        run: npm test
        env:
          DB_USER: root
          DB_PASSWORD: root
          DB_DATABASE: task_manager_test
          DB_HOST: localhost
          DB_DIALECT: mysql
          JWT_SECRET: test-secret
